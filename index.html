<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ms. Phona – English Pronunciation Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0eb;
  --surface: #ffffff;
  --panel: #fdf8f3;
  --accent: #e8623a;
  --accent2: #3a7de8;
  --accent3: #38b2a3;
  --accent4: #f0b429;
  --text: #1a1208;
  --text-mid: #5a4a38;
  --text-dim: #a89880;
  --border: #e8ddd0;
  --user-bubble: #3a7de8;
  --shadow: 0 4px 24px rgba(26,18,8,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image:
    radial-gradient(circle at 15% 85%, rgba(232,98,58,0.08) 0%, transparent 50%),
    radial-gradient(circle at 85% 15%, rgba(58,125,232,0.08) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(56,178,163,0.05) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}
.float-symbols { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.fsym {
  position: absolute; font-family: 'Syne', sans-serif; font-weight: 800;
  opacity: 0.04; color: var(--accent); animation: floatUp linear infinite; user-select: none;
}
@keyframes floatUp {
  0%{transform:translateY(110vh) rotate(0deg);opacity:0} 10%{opacity:0.04}
  90%{opacity:0.04} 100%{transform:translateY(-10vh) rotate(20deg);opacity:0}
}
.app {
  position: relative; z-index: 1; display: flex; flex-direction: column;
  height: 100vh; max-width: 820px; margin: 0 auto; width: 100%;
}

/* HEADER */
.header {
  display: flex; align-items: center; gap: 14px; padding: 13px 18px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  box-shadow: 0 2px 12px rgba(26,18,8,0.06); flex-shrink: 0; flex-wrap: wrap;
}
.teacher-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  background: linear-gradient(135deg, #e8623a, #f0a070);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; flex-shrink: 0;
  box-shadow: 0 0 0 3px var(--bg), 0 0 0 5px var(--accent); position: relative;
}
.teacher-avatar::after {
  content: ''; position: absolute; bottom: 2px; right: 2px;
  width: 10px; height: 10px; border-radius: 50%; background: #4ade80; border: 2px solid var(--surface);
}
.header-info { flex: 1; min-width: 100px; }
.header-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; line-height: 1; margin-bottom: 3px; }
.header-sub { font-size: 0.7rem; color: var(--text-dim); font-weight: 500; }
.header-chips { display: flex; gap: 5px; flex-wrap: wrap; }
.chip {
  font-size: 0.66rem; font-weight: 600; padding: 4px 10px; border-radius: 20px;
  border: 1.5px solid; cursor: pointer; transition: all 0.18s; white-space: nowrap;
  font-family: 'DM Sans', sans-serif; background: transparent;
}
.chip:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,0.12); }
.chip.orange { color: var(--accent); border-color: var(--accent); }
.chip.orange:hover { background: var(--accent); color: white; }
.chip.blue { color: var(--accent2); border-color: var(--accent2); }
.chip.blue:hover { background: var(--accent2); color: white; }
.chip.teal { color: var(--accent3); border-color: var(--accent3); }
.chip.teal:hover { background: var(--accent3); color: white; }
.chip.yellow { color: #b07a00; border-color: var(--accent4); }
.chip.yellow:hover { background: var(--accent4); color: white; }

/* CHAT */
.chat-area {
  flex: 1; overflow-y: auto; padding: 20px 16px;
  display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth;
}
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.msg { display: flex; gap: 10px; animation: msgIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes msgIn { from{opacity:0;transform:translateY(10px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
.msg.user { flex-direction: row-reverse; }
.msg-avatar {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 1rem; margin-top: 2px;
}
.msg.teacher .msg-avatar { background: linear-gradient(135deg, #e8623a, #f0a070); }
.msg.user .msg-avatar { background: linear-gradient(135deg, #3a7de8, #6fa3f5); color: white; font-size: 0.75rem; font-weight: 700; }
.msg-bubble {
  max-width: 74%; padding: 13px 16px; border-radius: 18px;
  font-size: 0.9rem; line-height: 1.65; position: relative;
}
.msg.teacher .msg-bubble {
  background: var(--surface); border: 1px solid var(--border);
  border-top-left-radius: 4px; color: var(--text); box-shadow: var(--shadow);
}
.msg.user .msg-bubble {
  background: var(--user-bubble); color: white;
  border-top-right-radius: 4px; box-shadow: 0 4px 16px rgba(58,125,232,0.25);
}

/* RICH CARDS */
.phon-card {
  background: linear-gradient(135deg, #fff8f0, #fef3e8);
  border: 1.5px solid #f0c898; border-radius: 14px; padding: 14px 16px; margin-top: 10px;
}
.phon-word { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; color: var(--accent); margin-bottom: 3px; }
.phon-ipa { font-size: 0.92rem; color: var(--text-mid); font-style: italic; margin-bottom: 8px; letter-spacing: 1px; }
.phon-syllables { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
.syl {
  padding: 3px 9px; border-radius: 7px; font-size: 0.78rem; font-weight: 600;
  background: var(--bg); border: 1.5px solid var(--border); color: var(--text-mid);
}
.syl.stressed {
  background: var(--accent); color: white; border-color: var(--accent);
  transform: translateY(-2px); box-shadow: 0 3px 8px rgba(232,98,58,0.3);
}
.card-btns { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 8px; }
.speak-btn {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--accent); color: white; border: none; border-radius: 9px;
  padding: 7px 13px; font-size: 0.76rem; font-weight: 600; cursor: pointer;
  font-family: 'DM Sans', sans-serif; transition: all 0.18s;
}
.speak-btn:hover { background: #d4522a; transform: scale(1.04); }
.speak-btn.speaking { background: var(--accent3); animation: speakPulse 0.6s infinite alternate; }
@keyframes speakPulse { from{box-shadow:0 0 0 0 rgba(56,178,163,0.4)} to{box-shadow:0 0 0 8px rgba(56,178,163,0)} }

/* MIC PRACTICE BTN */
.mic-practice-btn {
  display: inline-flex; align-items: center; gap: 5px;
  background: transparent; color: var(--accent2); border: 1.5px solid var(--accent2);
  border-radius: 9px; padding: 7px 13px; font-size: 0.76rem; font-weight: 600;
  cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.18s;
}
.mic-practice-btn:hover { background: var(--accent2); color: white; transform: scale(1.04); }
.mic-practice-btn.recording {
  background: #fee2e2; color: #dc2626; border-color: #dc2626;
  animation: recPulse 1s infinite;
}
@keyframes recPulse { 0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,0.4)} 50%{box-shadow:0 0 0 8px rgba(220,38,38,0)} }

/* ACCURACY RESULT */
.accuracy-result {
  margin-top: 10px; border-radius: 12px; padding: 12px 14px;
  border: 1.5px solid; display: none; animation: msgIn 0.3s ease;
}
.accuracy-result.show { display: block; }
.accuracy-result.great { background: #f0fdf4; border-color: #86efac; }
.accuracy-result.good  { background: #fefce8; border-color: #fde047; }
.accuracy-result.try   { background: #fff7ed; border-color: #fdba74; }
.accuracy-result.miss  { background: #fef2f2; border-color: #fca5a5; }

.acc-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.acc-score-ring {
  width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; position: relative;
}
.acc-score-ring svg { position: absolute; top:0; left:0; width:52px; height:52px; transform:rotate(-90deg); }
.ring-bg { fill: none; stroke: rgba(0,0,0,0.08); stroke-width: 4; }
.ring-fill { fill: none; stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.8s ease; }
.ring-text { position: relative; z-index: 1; font-family:'Syne',sans-serif; font-weight:800; font-size:0.82rem; }
.acc-label { font-weight: 700; font-size: 0.88rem; }
.acc-sub { font-size: 0.73rem; color: var(--text-dim); margin-top: 2px; }
.word-comparison { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 8px; }
.wc-item {
  flex: 1; min-width: 100px; background: rgba(255,255,255,0.7);
  border-radius: 9px; padding: 7px 11px; border: 1px solid rgba(0,0,0,0.06);
}
.wc-label { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 3px; }
.wc-value { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; }
.word-diff-row { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; align-items: center; }
.diff-token {
  padding: 3px 7px; border-radius: 5px; font-size: 0.8rem; font-weight: 600;
}
.diff-token.match { background: rgba(74,222,128,0.2); color: #166534; }
.diff-token.miss  { background: rgba(252,165,165,0.3); color: #991b1b; text-decoration: line-through; }
.diff-token.extra { background: rgba(253,186,116,0.3); color: #9a3412; }
.acc-tip { font-size: 0.77rem; margin-top: 8px; color: var(--text-mid); font-style: italic; }

/* INPUT MIC */
.mic-btn {
  width: 40px; height: 40px; border-radius: 13px; border: 1.5px solid var(--border);
  background: var(--panel); color: var(--text-mid); font-size: 1.05rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.18s; flex-shrink: 0;
}
.mic-btn:hover { border-color: var(--accent2); color: var(--accent2); background: #eef3ff; }
.mic-btn.active { background: #fee2e2; border-color: #dc2626; color: #dc2626; animation: recPulse 1s infinite; }

/* WAVEFORM */
.waveform-bar {
  align-items: center; gap: 3px; height: 28px; padding: 0 8px;
  background: var(--bg); border-radius: 8px; border: 1px solid var(--border);
  display: none;
}
.waveform-bar.show { display: flex; }
.wave-line { width: 3px; background: var(--accent2); border-radius: 2px; animation: wave 0.8s infinite ease-in-out; min-height: 4px; }
.wave-line:nth-child(1){animation-delay:0s;height:8px}.wave-line:nth-child(2){animation-delay:.1s;height:18px}
.wave-line:nth-child(3){animation-delay:.2s;height:12px}.wave-line:nth-child(4){animation-delay:.3s;height:22px}
.wave-line:nth-child(5){animation-delay:.4s;height:10px}.wave-line:nth-child(6){animation-delay:.15s;height:16px}
.wave-line:nth-child(7){animation-delay:.25s;height:8px}
@keyframes wave { 0%,100%{transform:scaleY(0.4)} 50%{transform:scaleY(1)} }

/* PAIR */
.minimal-pair-card { display: flex; gap: 10px; margin-top: 10px; }
.pair-item {
  flex: 1; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px;
  padding: 11px 13px; text-align: center; cursor: pointer; transition: all 0.2s;
}
.pair-item:hover { border-color: var(--accent2); background: #f0f5ff; transform: translateY(-2px); }
.pair-word { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.05rem; color: var(--text); margin-bottom: 2px; }
.pair-ipa { font-size: 0.76rem; color: var(--text-dim); font-style: italic; }
.pair-mic-btn {
  margin-top: 7px; width: 100%; padding: 5px; border-radius: 7px;
  border: 1px solid var(--border); background: white; font-size: 0.68rem;
  font-weight: 600; color: var(--accent2); cursor: pointer; transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}
.pair-mic-btn:hover { background: var(--accent2); color: white; border-color: var(--accent2); }
.pair-mic-btn.recording { background: #fee2e2; color: #dc2626; border-color: #dc2626; }

.stress-line {
  display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
  margin-top: 8px; padding: 9px 12px; background: var(--bg); border-radius: 10px; border: 1px solid var(--border);
}
.stress-word { font-size: 0.97rem; font-weight: 500; padding: 2px 0; }
.stress-word.STRESS { font-weight: 800; font-size: 1.1rem; color: var(--accent2); text-decoration: underline; text-decoration-color: var(--accent2); text-underline-offset: 3px; }
.stress-word.reduce { color: var(--text-dim); font-size: 0.85rem; }

.quiz-card { background: linear-gradient(135deg,#f0f5ff,#e8f0ff); border: 1.5px solid #c4d7ff; border-radius: 14px; padding: 15px 17px; margin-top: 10px; }
.quiz-q { font-weight: 600; margin-bottom: 11px; color: var(--text); }
.quiz-opts { display: flex; flex-direction: column; gap: 6px; }
.quiz-opt {
  background: white; border: 1.5px solid var(--border); border-radius: 10px;
  padding: 8px 13px; cursor: pointer; font-size: 0.86rem; font-weight: 500;
  transition: all 0.15s; text-align: left; font-family: 'DM Sans', sans-serif; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.quiz-opt:hover:not(:disabled) { border-color: var(--accent2); background: #f0f5ff; transform: translateX(3px); }
.quiz-opt.correct { border-color: #22c55e; background: #f0fdf4; color: #166534; }
.quiz-opt.wrong   { border-color: #ef4444; background: #fef2f2; color: #991b1b; }
.quiz-opt-key { width: 21px; height: 21px; border-radius: 5px; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; flex-shrink: 0; border: 1px solid var(--border); }

/* TYPING */
.typing-dots { display: flex; gap: 4px; padding: 13px 17px; background: var(--surface); border: 1px solid var(--border); border-radius: 18px; border-bottom-left-radius: 4px; box-shadow: var(--shadow); }
.typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); animation: typeDot 1.2s infinite; }
.typing-dots span:nth-child(2){animation-delay:.2s} .typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes typeDot { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-6px);opacity:1} }

/* QUICK PROMPTS */
.quick-prompts { padding: 0 16px 10px; display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }
.qp-btn {
  font-size: 0.71rem; font-weight: 600; padding: 5px 11px; border-radius: 20px;
  border: 1.5px solid var(--border); background: var(--surface); color: var(--text-mid);
  cursor: pointer; transition: all 0.18s; font-family: 'DM Sans', sans-serif; white-space: nowrap;
}
.qp-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }

/* INPUT */
.input-area { padding: 11px 16px 17px; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
.input-row {
  display: flex; gap: 7px; align-items: flex-end; background: var(--panel);
  border: 1.5px solid var(--border); border-radius: 20px; padding: 7px 7px 7px 15px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input-row:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,98,58,0.1); }
#userInput {
  flex: 1; border: none; background: transparent; font-family: 'DM Sans', sans-serif;
  font-size: 0.92rem; color: var(--text); resize: none; max-height: 120px; min-height: 26px;
  line-height: 1.5; outline: none;
}
#userInput::placeholder { color: var(--text-dim); }
.send-btn {
  width: 38px; height: 38px; border-radius: 13px; background: var(--accent); border: none;
  color: white; font-size: 1rem; cursor: pointer; display: flex; align-items: center;
  justify-content: center; transition: all 0.18s; flex-shrink: 0;
}
.send-btn:hover { background: #d4522a; transform: scale(1.08); }
.send-btn:disabled { background: var(--border); cursor: default; transform: none; }
.input-meta { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 6px; }
.input-hint { font-size: 0.66rem; color: var(--text-dim); }
.mic-status { font-size: 0.68rem; color: #dc2626; font-weight: 600; padding: 2px 7px; background: #fee2e2; border-radius: 7px; display: none; }
.mic-status.show { display: inline-block; }

@media(max-width:600px){ .header-chips{display:none} .msg-bubble{max-width:88%} }
</style>
</head>
<body>
<div class="float-symbols" id="floatSymbols"></div>
<div class="app">

  <div class="header">
    <div class="teacher-avatar">👩‍🏫</div>
    <div class="header-info">
      <div class="header-name">Ms. Phona</div>
      <div class="header-sub">English Pronunciation Coach • Mic-enabled 🎙️</div>
    </div>
    <div class="header-chips">
      <div class="chip orange" onclick="sendQuick('How do I pronounce comfortable?')">🔊 Pronounce</div>
      <div class="chip blue"   onclick="sendQuick('Explain sentence stress with an example')">🎵 Stress</div>
      <div class="chip teal"   onclick="sendQuick('Give me a minimal pairs exercise with ship and sheep')">👥 Pairs</div>
      <div class="chip yellow" onclick="sendQuick('Give me a quick pronunciation quiz!')">🧩 Quiz</div>
    </div>
  </div>

  <div class="chat-area" id="chatArea"></div>

  <div class="quick-prompts" id="quickPrompts">
    <button class="qp-btn" onclick="sendQuick('How do I pronounce Wednesday?')">📅 Wednesday</button>
    <button class="qp-btn" onclick="sendQuick('What is the difference between th in this and think?')">🔡 TH sounds</button>
    <button class="qp-btn" onclick="sendQuick('Help me with silent letters in English')">🤫 Silent letters</button>
    <button class="qp-btn" onclick="sendQuick('Show me the schwa sound with examples')">🔤 Schwa /ə/</button>
    <button class="qp-btn" onclick="sendQuick('Minimal pairs: live vs leave')">🎯 live / leave</button>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" rows="1" placeholder="Ask Ms. Phona anything about pronunciation…"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <div class="waveform-bar" id="waveformBar">
        <div class="wave-line"></div><div class="wave-line"></div><div class="wave-line"></div>
        <div class="wave-line"></div><div class="wave-line"></div><div class="wave-line"></div>
        <div class="wave-line"></div>
      </div>
      <button class="mic-btn" id="globalMicBtn" onclick="toggleGlobalMic()" title="Speak your question">🎙️</button>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
    <div class="input-meta">
      <div class="input-hint">Type or 🎙️ speak your question</div>
      <span class="mic-status" id="micStatus">● Recording…</span>
    </div>
  </div>
</div>

<script>
// floating symbols
document.getElementById('floatSymbols').innerHTML =
  ['/æ/','/ɪ/','/θ/','/ʃ/','/ŋ/','/ɔː/','IPA','stress','schwa','/ə/','fluency','/juː/']
  .map((s,i)=>`<div class="fsym" style="left:${5+i*8}%;font-size:${1.5+Math.random()*2}rem;animation-duration:${14+Math.random()*10}s;animation-delay:${-Math.random()*14}s">${s}</div>`)
  .join('');

const chatArea = document.getElementById('chatArea');
let conversationHistory = [];
let isLoading = false;
let isGlobalRecording = false;
let globalRec = null;

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const hasMic = !!SpeechRecognition;

const SYSTEM_PROMPT = `You are Ms. Phona, a cool encouraging English pronunciation coach for tweens and teens (11-17). Warm, witty, never condescending. Light humour, occasional emojis.

Use these special blocks in your replies:
- Word: [[WORD_CARD: word="X" ipa="/X/" syllables="X-X-X" stressed="0" tip="memory tip"]]
- Stress: [[STRESS: sentence="I WANT to GO home" analysis="explanation of stress"]]
- Pairs: [[PAIR: w1="ship" ipa1="/ʃɪp/" w2="sheep" ipa2="/ʃiːp/" diff="key difference"]]
- Quiz: [[QUIZ: q="question?" a="correct answer" opts="opt1|opt2|opt3" correct="1"]]

Rules: keep replies focused and snappy. Always encourage practice. Teens lose interest fast!`;

// ── Accuracy engine ──
function levenshtein(a,b){
  const m=a.length,n=b.length,dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function calcAccuracy(target, spoken){
  const t=target.toLowerCase().replace(/[^a-z\s]/g,'').trim();
  const s=spoken.toLowerCase().replace(/[^a-z\s]/g,'').trim();
  const tW=t.split(' '), sW=s?s.split(' '):[];
  if(!s) return {score:0,tW,sW};
  if(tW.length===1){
    if(tW[0]===sW[0]) return {score:100,tW,sW};
    const sim=Math.round((1-levenshtein(tW[0],sW[0]||'')/Math.max(tW[0].length,(sW[0]||'').length))*100);
    return {score:Math.max(0,sim),tW,sW};
  }
  const used=new Array(sW.length).fill(false);
  let m=0;
  tW.forEach(tw=>{const i=sW.findIndex((sw,i)=>!used[i]&&sw===tw);if(i!==-1){m++;used[i]=true;}});
  return {score:Math.round(m/tW.length*100),tW,sW};
}
function scoreInfo(s){
  if(s>=90)return{cls:'great',emoji:'🏆',label:'Excellent!',   tip:'Spot-on pronunciation! You nailed it!'};
  if(s>=75)return{cls:'good', emoji:'🌟',label:'Great job!',   tip:'Almost perfect — just a tiny polish needed.'};
  if(s>=50)return{cls:'try',  emoji:'💪',label:'Good try!',    tip:"Getting there! Try again, slowly and clearly."};
  return       {cls:'miss', emoji:'🔁',label:'Try again!',   tip:'Listen to the example first, then record again.'};
}
function showAccuracy(target, spoken, container){
  const {score,tW,sW}=calcAccuracy(target,spoken);
  const {cls,emoji,label,tip}=scoreInfo(score);
  const C=2*Math.PI*22, offset=C-(score/100)*C;
  const color={great:'#22c55e',good:'#eab308',try:'#f97316',miss:'#ef4444'}[cls];
  const diffHtml=tW.map(tw=>`<span class="diff-token ${sW.includes(tw)?'match':'miss'}">${tw}</span>`).join(' ');
  const extras=sW.filter(sw=>!tW.includes(sw));
  const extraHtml=extras.length?` <span style="font-size:0.68rem;color:var(--text-dim)">(extra:)</span> `+extras.map(w=>`<span class="diff-token extra">${w}</span>`).join(' '):'';
  container.innerHTML=`
    <div class="acc-header">
      <div class="acc-score-ring">
        <svg viewBox="0 0 52 52"><circle class="ring-bg" cx="26" cy="26" r="22"/><circle class="ring-fill" cx="26" cy="26" r="22" stroke="${color}" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"/></svg>
        <span class="ring-text" style="color:${color}">${score}%</span>
      </div>
      <div><div class="acc-label">${emoji} ${label}</div><div class="acc-sub">You said: "<em>${spoken||'—'}</em>"</div></div>
    </div>
    <div class="word-comparison">
      <div class="wc-item"><div class="wc-label">Target</div><div class="wc-value">${target}</div></div>
      <div class="wc-item"><div class="wc-label">Recognised</div><div class="wc-value" style="color:${color}">${spoken||'—'}</div></div>
    </div>
    <div class="word-diff-row">${diffHtml}${extraHtml}</div>
    <div class="acc-tip">💡 ${tip}</div>`;
  container.className=`accuracy-result ${cls} show`;
}

// ── Practice recording ──
function startPractice(target, btn, resultDiv){
  if(!hasMic){
    resultDiv.innerHTML='<div style="color:#dc2626;font-size:0.8rem">🎙️ Mic not supported. Please use Chrome or Edge.</div>';
    resultDiv.className='accuracy-result miss show'; return;
  }
  const rec=new SpeechRecognition();
  rec.lang='en-US'; rec.interimResults=false; rec.maxAlternatives=3;
  btn.classList.add('recording'); btn.textContent='⏹ Stop';
  rec.onresult=e=>{
    const spoken=Array.from(e.results[0]).map(r=>r.transcript).join(' ').trim();
    showAccuracy(target,spoken,resultDiv);
    btn.classList.remove('recording'); btn.innerHTML='🎙️ Try again';
  };
  rec.onerror=()=>{
    resultDiv.innerHTML='<div style="font-size:0.8rem;color:#dc2626">❌ Couldn\'t hear that. Check mic permissions and try again.</div>';
    resultDiv.className='accuracy-result miss show';
    btn.classList.remove('recording'); btn.innerHTML='🎙️ Try again';
  };
  rec.onend=()=>{ btn.classList.remove('recording'); };
  rec.start();
  btn.onclick=()=>{ rec.stop(); btn.classList.remove('recording'); btn.innerHTML='🎙️ Try again'; };
}

// ── Global mic for input ──
function toggleGlobalMic(){
  if(!hasMic){alert('Speech recognition needs Chrome or Edge browser.');return;}
  const btn=document.getElementById('globalMicBtn');
  const status=document.getElementById('micStatus');
  const wave=document.getElementById('waveformBar');
  const input=document.getElementById('userInput');
  if(isGlobalRecording){
    globalRec?.stop(); isGlobalRecording=false;
    btn.classList.remove('active'); btn.textContent='🎙️';
    status.classList.remove('show'); wave.classList.remove('show'); return;
  }
  globalRec=new SpeechRecognition();
  globalRec.lang='en-US'; globalRec.interimResults=true;
  isGlobalRecording=true;
  btn.classList.add('active'); btn.textContent='⏹';
  status.classList.add('show'); wave.classList.add('show');
  globalRec.onresult=e=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join('');
    input.value=t; autoResize(input);
    if(e.results[e.results.length-1].isFinal){
      isGlobalRecording=false;
      btn.classList.remove('active'); btn.textContent='🎙️';
      status.classList.remove('show'); wave.classList.remove('show');
    }
  };
  globalRec.onerror=globalRec.onend=()=>{
    isGlobalRecording=false; btn.classList.remove('active'); btn.textContent='🎙️';
    status.classList.remove('show'); wave.classList.remove('show');
  };
  globalRec.start();
}

// ── Render message ──
function renderMessage(raw){
  let h=raw;

  // WORD CARD
  h=h.replace(/\[\[WORD_CARD: word="([^"]+)" ipa="([^"]+)" syllables="([^"]+)" stressed="(\d+)" tip="([^"]+)"\]\]/g,
    (_,word,ipa,syls,si,tip)=>{
      const sArr=syls.split('-');
      const sylH=sArr.map((s,i)=>`<span class="syl ${i==si?'stressed':''}">${s}</span>`).join('');
      return `<div class="phon-card">
        <div class="phon-word">${word}</div>
        <div class="phon-ipa">${ipa}</div>
        <div class="phon-syllables">${sylH}</div>
        <div style="font-size:0.76rem;color:var(--text-mid);margin-bottom:9px">💡 ${tip}</div>
        <div class="card-btns">
          <button class="speak-btn" data-text="${word}">🔊 Hear it</button>
          ${hasMic?`<button class="mic-practice-btn" data-target="${word}">🎙️ Practice</button>`:''}
        </div>
        <div class="accuracy-result"></div>
      </div>`;
    });

  // STRESS
  h=h.replace(/\[\[STRESS: sentence="([^"]+)" analysis="([^"]+)"\]\]/g,
    (_,sent,analysis)=>{
      const plain=sent.replace(/[A-Z]{2,}/g,w=>w.toLowerCase()).replace(/\(([^)]+)\)/g,'$1');
      const wH=sent.split(' ').map(w=>{
        if(w===w.toUpperCase()&&w.match(/[A-Z]{2,}/))return`<span class="stress-word STRESS">${w}</span>`;
        if(w.startsWith('(')&&w.endsWith(')'))return`<span class="stress-word reduce">${w.slice(1,-1)}</span>`;
        return`<span class="stress-word">${w}</span>`;
      }).join(' ');
      return `<div class="stress-practice-wrap">
        <div class="stress-line">${wH}</div>
        <div style="font-size:0.74rem;color:var(--text-dim);margin-top:5px">📌 ${analysis}</div>
        <div class="card-btns" style="margin-top:8px">
          <button class="speak-btn" data-text="${plain}">🔊 Hear it</button>
          ${hasMic?`<button class="mic-practice-btn stress-practice-btn" data-target="${plain}">🎙️ Practise sentence</button>`:''}
        </div>
        <div class="accuracy-result"></div>
      </div>`;
    });

  // PAIR
  h=h.replace(/\[\[PAIR: w1="([^"]+)" ipa1="([^"]+)" w2="([^"]+)" ipa2="([^"]+)" diff="([^"]+)"\]\]/g,
    (_,w1,ipa1,w2,ipa2,diff)=>{
      const micH=hasMic?`<button class="pair-mic-btn">🎙️ Say it</button><div class="accuracy-result" style="margin-top:5px"></div>`:'';
      return `<div class="minimal-pair-card">
        <div class="pair-item">
          <div class="pair-word">${w1}</div><div class="pair-ipa">${ipa1}</div>
          <div style="font-size:0.66rem;color:var(--text-dim);margin-top:3px">tap to hear</div>${micH}
        </div>
        <div class="pair-item">
          <div class="pair-word">${w2}</div><div class="pair-ipa">${ipa2}</div>
          <div style="font-size:0.66rem;color:var(--text-dim);margin-top:3px">tap to hear</div>${micH}
        </div>
      </div>
      <div style="font-size:0.76rem;color:var(--text-mid);margin-top:7px;padding:7px 11px;background:var(--bg);border-radius:8px;border:1px solid var(--border)">🎯 ${diff}</div>`;
    });

  // QUIZ
  h=h.replace(/\[\[QUIZ: q="([^"]+)" a="([^"]+)" opts="([^"]+)" correct="(\d+)"\]\]/g,
    (_,q,a,opts,correct)=>{
      const letters=['A','B','C','D'];
      const opH=opts.split('|').map((o,i)=>
        `<button class="quiz-opt" data-correct="${i==correct}" data-answer="${a}"><span class="quiz-opt-key">${letters[i]}</span>${o}</button>`
      ).join('');
      return `<div class="quiz-card"><div class="quiz-q">❓ ${q}</div><div class="quiz-opts">${opH}</div></div>`;
    });

  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/\n/g,'<br>');
  h=h.replace(/^- /gm,'• ');
  return h;
}

function addTeacherMessage(raw){
  const d=document.createElement('div'); d.className='msg teacher';
  const av=document.createElement('div'); av.className='msg-avatar'; av.textContent='👩‍🏫';
  const bu=document.createElement('div'); bu.className='msg-bubble'; bu.innerHTML=renderMessage(raw);
  d.appendChild(av); d.appendChild(bu);
  chatArea.appendChild(d); chatArea.scrollTop=chatArea.scrollHeight;

  // TTS
  bu.querySelectorAll('.speak-btn').forEach(b=>b.addEventListener('click',()=>speakText(b.dataset.text,b)));
  // Word card mic
  bu.querySelectorAll('.mic-practice-btn:not(.stress-practice-btn)').forEach(b=>{
    const rd=b.closest('.phon-card,.stress-practice-wrap')?.querySelector('.accuracy-result');
    if(rd) b.addEventListener('click',()=>startPractice(b.dataset.target,b,rd));
  });
  // Stress mic
  bu.querySelectorAll('.stress-practice-btn').forEach(b=>{
    const rd=b.closest('.stress-practice-wrap')?.querySelector('.accuracy-result');
    if(rd) b.addEventListener('click',()=>startPractice(b.dataset.target,b,rd));
  });
  // Quiz
  bu.querySelectorAll('.quiz-opt').forEach(b=>b.addEventListener('click',()=>handleQuiz(b)));
  // Pair
  bu.querySelectorAll('.pair-item').forEach(item=>{
    const word=item.querySelector('.pair-word').textContent;
    const micBtn=item.querySelector('.pair-mic-btn');
    const rd=item.querySelector('.accuracy-result');
    micBtn?.addEventListener('click',e=>{ e.stopPropagation(); startPractice(word,micBtn,rd); });
    item.addEventListener('click',e=>{
      if(e.target.classList.contains('pair-mic-btn'))return;
      window.speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(word); u.lang='en-US'; u.rate=0.82;
      window.speechSynthesis.speak(u);
    });
  });
}

function handleQuiz(btn){
  const parent=btn.closest('.quiz-opts');
  parent.querySelectorAll('.quiz-opt').forEach(b=>b.disabled=true);
  const ok=btn.dataset.correct==='true';
  btn.classList.add(ok?'correct':'wrong');
  if(!ok)parent.querySelectorAll('.quiz-opt').forEach(b=>{if(b.dataset.correct==='true')b.classList.add('correct');});
  const fb=document.createElement('div');
  fb.style.cssText='font-size:0.78rem;margin-top:9px;padding:7px 11px;border-radius:8px;font-weight:600;';
  fb.style.background=ok?'#f0fdf4':'#fef2f2'; fb.style.color=ok?'#166534':'#991b1b';
  fb.textContent=ok?'✅ Correct! Well done!':'❌ Not quite — answer: '+btn.dataset.answer;
  btn.closest('.quiz-card').appendChild(fb);
}

function addUserMessage(text){
  const d=document.createElement('div'); d.className='msg user';
  const av=document.createElement('div'); av.className='msg-avatar'; av.textContent='🧑';
  const bu=document.createElement('div'); bu.className='msg-bubble'; bu.textContent=text;
  d.appendChild(bu); d.appendChild(av);
  chatArea.appendChild(d); chatArea.scrollTop=chatArea.scrollHeight;
}

function showTyping(){
  const d=document.createElement('div'); d.className='msg teacher'; d.id='typingIndicator';
  d.innerHTML=`<div class="msg-avatar">👩‍🏫</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
  chatArea.appendChild(d); chatArea.scrollTop=chatArea.scrollHeight;
}
function hideTyping(){ document.getElementById('typingIndicator')?.remove(); }

function speakText(text,btn){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text); u.lang='en-US'; u.rate=0.82;
  if(btn){ btn.classList.add('speaking'); btn.textContent='⏸ Speaking…';
    u.onend=()=>{ btn.classList.remove('speaking'); btn.innerHTML='🔊 Hear it'; }; }
  window.speechSynthesis.speak(u);
}

async function sendMessage(){
  const input=document.getElementById('userInput');
  const text=input.value.trim();
  if(!text||isLoading)return;
  input.value=''; input.style.height='auto';
  await sendQuick(text);
}
async function sendQuick(text){
  if(isLoading)return;
  isLoading=true;
  document.getElementById('sendBtn').disabled=true;
  document.getElementById('quickPrompts').style.display='none';
  addUserMessage(text);
  conversationHistory.push({role:'user',content:text});
  showTyping();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYSTEM_PROMPT,messages:conversationHistory})
    });
    const data=await res.json();
    const reply=data.content?.[0]?.text||'Something went wrong. Try again!';
    hideTyping(); conversationHistory.push({role:'assistant',content:reply});
    addTeacherMessage(reply);
  }catch(e){ hideTyping(); addTeacherMessage("Oops! Lost connection for a second 😅 Try again!"); }
  isLoading=false; document.getElementById('sendBtn').disabled=false;
  chatArea.scrollTop=chatArea.scrollHeight;
}

function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }

Let's go! ✨`);
