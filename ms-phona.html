<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ms. Phona – Pronunciation Coach</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f7f3ee;--surface:#fff;--panel:#fdf9f5;
    --accent:#e8623a;--blue:#3a7de8;--green:#22c55e;--teal:#38b2a3;--gold:#f0b429;
    --text:#1a1208;--mid:#5a4a38;--dim:#a89880;--border:#e8ddd0;
    --shadow:0 2px 16px rgba(26,18,8,.08);
  }
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

  /* HEADER */
  .hdr{display:flex;align-items:center;gap:12px;padding:12px 18px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;box-shadow:var(--shadow)}
  .av-wrap{position:relative;flex-shrink:0}
  .av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#e8623a,#f5a87a);display:flex;align-items:center;justify-content:center;font-size:1.3rem;box-shadow:0 0 0 3px var(--bg),0 0 0 5px var(--accent)}
  .av-dot{position:absolute;bottom:2px;right:2px;width:9px;height:9px;border-radius:50%;background:#4ade80;border:2px solid var(--surface)}
  .hdr-info{flex:1}
  .hdr-name{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;line-height:1;margin-bottom:2px}
  .hdr-sub{font-size:.7rem;color:var(--dim)}
  .chips{display:flex;gap:5px;flex-wrap:wrap}
  .chip{font-size:.65rem;font-weight:600;padding:4px 10px;border-radius:20px;border:1.5px solid;cursor:pointer;transition:all .15s;white-space:nowrap;background:transparent;font-family:'DM Sans',sans-serif}
  .chip.o{color:var(--accent);border-color:var(--accent)}.chip.o:hover{background:var(--accent);color:#fff}
  .chip.b{color:var(--blue);border-color:var(--blue)}.chip.b:hover{background:var(--blue);color:#fff}
  .chip.t{color:var(--teal);border-color:var(--teal)}.chip.t:hover{background:var(--teal);color:#fff}
  .chip.y{color:#b07a00;border-color:var(--gold)}.chip.y:hover{background:var(--gold);color:#fff}

  /* CHAT */
  .chat{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:13px;scroll-behavior:smooth}
  .chat::-webkit-scrollbar{width:3px}.chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  .msg{display:flex;gap:8px;animation:pop .25s cubic-bezier(.34,1.56,.64,1)}
  @keyframes pop{from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:none}}
  .msg.user{flex-direction:row-reverse}
  .msg-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.9rem;margin-top:2px}
  .msg.teacher .msg-av{background:linear-gradient(135deg,#e8623a,#f5a87a)}
  .msg.user .msg-av{background:var(--blue);color:#fff;font-size:.68rem;font-weight:600}
  .bubble{max-width:76%;padding:11px 15px;border-radius:16px;font-size:.88rem;line-height:1.65}
  .msg.teacher .bubble{background:var(--surface);border:1px solid var(--border);border-top-left-radius:3px;box-shadow:var(--shadow)}
  .msg.user .bubble{background:var(--blue);color:#fff;border-top-right-radius:3px}

  /* WORD CARD */
  .wcard{background:linear-gradient(135deg,#fff8f0,#fef0e4);border:1.5px solid #f5c898;border-radius:12px;padding:13px 15px;margin-top:8px}
  .wc-word{font-family:'Syne',sans-serif;font-weight:800;font-size:1.35rem;color:var(--accent);margin-bottom:2px}
  .wc-ipa{font-size:.88rem;color:var(--mid);font-style:italic;margin-bottom:7px}
  .wc-syls{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px}
  .syl{padding:2px 8px;border-radius:6px;font-size:.75rem;font-weight:600;background:var(--bg);border:1.5px solid var(--border);color:var(--mid)}
  .syl.s{background:var(--accent);color:#fff;border-color:var(--accent);transform:translateY(-2px);box-shadow:0 2px 6px rgba(232,98,58,.3)}
  .wc-tip{font-size:.74rem;color:var(--mid);margin-bottom:9px}
  .card-btns{display:flex;gap:6px;flex-wrap:wrap}

  /* BUTTONS */
  .btn-hear{display:inline-flex;align-items:center;gap:5px;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:.73rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
  .btn-hear:hover{background:#d4522a;transform:scale(1.03)}
  .btn-hear.spk{background:var(--teal)}
  .btn-mic{display:inline-flex;align-items:center;gap:5px;background:transparent;color:var(--blue);border:1.5px solid var(--blue);border-radius:8px;padding:6px 12px;font-size:.73rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
  .btn-mic:hover{background:var(--blue);color:#fff}
  .btn-mic.rec{background:#fee2e2;color:#dc2626;border-color:#dc2626;animation:rp 1s infinite}
  @keyframes rp{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.3)}50%{box-shadow:0 0 0 7px rgba(220,38,38,0)}}

  /* ACCURACY */
  .acc{margin-top:9px;border-radius:10px;padding:11px 13px;border:1.5px solid;display:none}
  .acc.show{display:block;animation:pop .3s ease}
  .acc.great{background:#f0fdf4;border-color:#86efac}
  .acc.good{background:#fefce8;border-color:#fde047}
  .acc.try{background:#fff7ed;border-color:#fdba74}
  .acc.miss{background:#fef2f2;border-color:#fca5a5}
  .acc-top{display:flex;align-items:center;gap:9px;margin-bottom:7px}
  .acc-pct{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem}
  .acc-lbl{font-size:.83rem;font-weight:600}
  .acc-said{font-size:.73rem;color:var(--dim)}
  .diff{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px}
  .dt{padding:1px 6px;border-radius:4px;font-size:.75rem;font-weight:600}
  .dt.m{background:#dcfce7;color:#166534}
  .dt.x{background:#fee2e2;color:#991b1b;text-decoration:line-through}
  .dt.e{background:#fff7ed;color:#9a3412}
  .acc-tip{font-size:.72rem;color:var(--mid);margin-top:5px;font-style:italic}

  /* STRESS */
  .stress-wrap{margin-top:8px}
  .stress-line{display:flex;gap:5px;flex-wrap:wrap;padding:8px 12px;background:var(--panel);border-radius:9px;border:1px solid var(--border);margin-bottom:5px}
  .sw{font-size:.93rem;font-weight:400;color:var(--text)}
  .sw.S{font-weight:700;color:var(--blue);text-decoration:underline;text-underline-offset:2px}
  .sw.R{color:var(--dim);font-size:.82rem}

  /* PAIRS */
  .pairs{display:flex;gap:8px;margin-top:8px}
  .pair-card{flex:1;background:var(--panel);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;text-align:center;cursor:pointer;transition:all .15s;user-select:none}
  .pair-card:hover{border-color:var(--blue);background:#eff6ff;transform:translateY(-2px)}
  .pair-w{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;color:var(--text);margin-bottom:2px}
  .pair-i{font-size:.73rem;color:var(--dim);font-style:italic}
  .pair-tap{font-size:.63rem;color:var(--dim);margin-top:3px}
  .pair-mbtn{margin-top:6px;width:100%;padding:4px 0;border-radius:6px;border:1px solid var(--border);background:var(--surface);font-size:.67rem;font-weight:600;color:var(--blue);cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
  .pair-mbtn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
  .pair-mbtn.rec{background:#fee2e2;color:#dc2626;border-color:#dc2626}

  /* QUIZ */
  .quiz{background:linear-gradient(135deg,#eff6ff,#e8f0ff);border:1.5px solid #bfdbfe;border-radius:12px;padding:13px 15px;margin-top:8px}
  .quiz-q{font-weight:600;font-size:.87rem;margin-bottom:9px}
  .quiz-opts{display:flex;flex-direction:column;gap:5px}
  .qopt{background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:7px 12px;cursor:pointer;font-size:.83rem;font-weight:500;transition:all .15s;text-align:left;font-family:'DM Sans',sans-serif;color:var(--text);display:flex;align-items:center;gap:7px}
  .qopt:hover:not([disabled]){border-color:var(--blue);background:#eff6ff;transform:translateX(3px)}
  .qopt.ok{border-color:#86efac;background:#f0fdf4;color:#166534}
  .qopt.no{border-color:#fca5a5;background:#fef2f2;color:#991b1b}
  .qkey{width:19px;height:19px;border-radius:4px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:.67rem;font-weight:700;flex-shrink:0;border:1px solid var(--border);color:var(--mid)}

  /* TYPING */
  .tdots{display:flex;gap:4px;padding:11px 15px;background:var(--surface);border:1px solid var(--border);border-radius:16px;border-top-left-radius:3px;box-shadow:var(--shadow)}
  .td{width:6px;height:6px;border-radius:50%;background:var(--dim);animation:td 1.2s infinite}
  .td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
  @keyframes td{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

  /* QUICK PROMPTS */
  .qps{padding:0 14px 9px;display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0}
  .qpb{font-size:.7rem;font-weight:600;padding:4px 10px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--mid);cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;white-space:nowrap}
  .qpb:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px)}

  /* INPUT */
  .input-area{padding:10px 14px 15px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
  .input-row{display:flex;gap:6px;align-items:flex-end;background:var(--panel);border:1.5px solid var(--border);border-radius:18px;padding:6px 6px 6px 14px;transition:border-color .2s}
  .input-row:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,98,58,.08)}
  #inp{flex:1;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:.88rem;color:var(--text);resize:none;max-height:100px;min-height:24px;line-height:1.5;outline:none}
  #inp::placeholder{color:var(--dim)}
  .ibtn{width:36px;height:36px;border-radius:11px;border:1.5px solid var(--border);background:transparent;font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;color:var(--mid)}
  .ibtn:hover{border-color:var(--blue);color:var(--blue);background:#eff6ff}
  .ibtn.rec{background:#fee2e2;border-color:#dc2626;color:#dc2626;animation:rp 1s infinite}
  .sbtn{width:36px;height:36px;border-radius:11px;background:var(--accent);border:none;color:#fff;font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
  .sbtn:hover{background:#d4522a;transform:scale(1.06)}
  .sbtn:disabled{background:var(--border);cursor:default;transform:none}
  .hint{font-size:.65rem;color:var(--dim);text-align:center;margin-top:5px}
  .rec-on{color:#dc2626;font-weight:600}

  /* NO-MIC notice */
  .no-mic-note{font-size:.7rem;color:var(--dim);background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:6px 10px;margin-top:8px;text-align:center;display:none}

  @media(max-width:560px){.chips{display:none}.bubble{max-width:88%}}
</style>
</head>
<body>

<div class="hdr">
  <div class="av-wrap">
    <div class="av">👩‍🏫</div>
    <div class="av-dot"></div>
  </div>
  <div class="hdr-info">
    <div class="hdr-name">Ms. Phona</div>
    <div class="hdr-sub">English Pronunciation Coach · Mic-enabled 🎙️</div>
  </div>
  <div class="chips">
    <div class="chip o" onclick="sq('How do I pronounce the word comfortable?')">🔊 Pronounce</div>
    <div class="chip b" onclick="sq('Show me sentence stress with an example')">🎵 Stress</div>
    <div class="chip t" onclick="sq('Give me a minimal pairs exercise with ship and sheep')">👥 Pairs</div>
    <div class="chip y" onclick="sq('Give me a quick pronunciation quiz')">🧩 Quiz</div>
  </div>
</div>

<div class="chat" id="chat"></div>

<div class="qps" id="qps">
  <button class="qpb" onclick="sq('How do I pronounce Wednesday?')">📅 Wednesday</button>
  <button class="qpb" onclick="sq('The th sound in this vs think')">🔡 TH sounds</button>
  <button class="qpb" onclick="sq('Silent letters in English')">🤫 Silent letters</button>
  <button class="qpb" onclick="sq('Schwa sound with examples')">🔤 Schwa /ə/</button>
  <button class="qpb" onclick="sq('Minimal pair: bit vs beat')">🎯 bit / beat</button>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="inp" rows="1" placeholder="Ask Ms. Phona about pronunciation…"
      onkeydown="onKey(event)" oninput="resize(this)"></textarea>
    <button class="ibtn" id="micBtn" onclick="toggleMic()" title="Speak your question">🎙️</button>
    <button class="sbtn" id="sendBtn" onclick="doSend()">➤</button>
  </div>
  <div class="hint" id="hint">Type or 🎙️ speak your question · <a href="https://claude.ai" style="color:var(--accent);text-decoration:none">Powered by Claude</a></div>
  <div class="no-mic-note" id="noMicNote">🎙️ Mic buttons need Chrome or Edge browser to work.</div>
</div>

<script>
// ── setup ─────────────────────────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const hasMic = !!SR;
const chatEl = document.getElementById('chat');
let history = [], busy = false, gRec = null, gRecOn = false;

if (!hasMic) document.getElementById('noMicNote').style.display = 'block';

// ── system prompt ─────────────────────────────────────────
const SYS = `You are Ms. Phona, a warm and encouraging English pronunciation coach for teens aged 11-17. Be brief, friendly, and occasionally funny.

When explaining a word's pronunciation, ALWAYS output this exact block (fill in real values):
[[WORD: word="X" ipa="/X/" syls="X-X" stress="0" tip="short memory tip"]]
(stress= index of stressed syllable, 0-based. syls= syllables joined with hyphens)

When showing sentence stress, ALWAYS output:
[[STRESS: line="I WANT to GO home" note="short explanation"]]
(stressed words in ALL CAPS, reduced/weak words in (parentheses))

When doing minimal pairs, ALWAYS output:
[[PAIR: w1="ship" p1="/ʃɪp/" w2="sheep" p2="/ʃiːp/" key="short difference tip"]]

When giving a quiz, ALWAYS output:
[[QUIZ: q="question text?" opts="option A|option B|option C" ans="1"]]
(ans= 0-based index of correct option)

Rules:
- Always include the blocks above when the topic calls for them — never skip them
- Keep surrounding text short and energetic
- One encouragement per reply max`;

// ── levenshtein ───────────────────────────────────────────
function lev(a, b) {
  const m = a.length, n = b.length;
  const D = Array.from({length: m+1}, (_, i) =>
    Array.from({length: n+1}, (_, j) => i === 0 ? j : j === 0 ? i : 0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      D[i][j] = a[i-1] === b[j-1] ? D[i-1][j-1] : 1 + Math.min(D[i-1][j], D[i][j-1], D[i-1][j-1]);
  return D[m][n];
}

// ── accuracy scoring ──────────────────────────────────────
function calcScore(target, spoken) {
  const t = target.toLowerCase().replace(/[^a-z\s]/g, '').trim();
  const s = (spoken || '').toLowerCase().replace(/[^a-z\s]/g, '').trim();
  const tW = t.split(/\s+/), sW = s ? s.split(/\s+/) : [];
  if (!s) return {pct: 0, tW, sW};
  if (tW.length === 1) {
    if (tW[0] === (sW[0] || '')) return {pct: 100, tW, sW};
    const sim = Math.max(0, Math.round((1 - lev(tW[0], sW[0] || '') / Math.max(tW[0].length, (sW[0] || '').length || 1)) * 100));
    return {pct: sim, tW, sW};
  }
  const used = new Array(sW.length).fill(false); let hits = 0;
  tW.forEach(tw => { const i = sW.findIndex((sw, j) => !used[j] && sw === tw); if (i !== -1) { hits++; used[i] = true; } });
  return {pct: Math.round(hits / tW.length * 100), tW, sW};
}

function getBadge(p) {
  if (p >= 90) return {cls: 'great', em: '🏆', lbl: 'Excellent!', tip: 'Spot-on! You nailed it!'};
  if (p >= 75) return {cls: 'good',  em: '🌟', lbl: 'Great job!', tip: 'Almost perfect — just a tiny tweak!'};
  if (p >= 50) return {cls: 'try',   em: '💪', lbl: 'Good try!',  tip: 'Getting there! Try again slowly.'};
  return              {cls: 'miss',  em: '🔁', lbl: 'Try again!', tip: 'Listen first, then record again.'};
}

function showAcc(target, spoken, box) {
  const {pct, tW, sW} = calcScore(target, spoken);
  const {cls, em, lbl, tip} = getBadge(pct);
  const col = {great: '#166534', good: '#854d0e', try: '#9a3412', miss: '#991b1b'}[cls];
  const diffH = tW.map(w => `<span class="dt ${sW.includes(w) ? 'm' : 'x'}">${w}</span>`).join(' ');
  const extW = sW.filter(w => !tW.includes(w));
  const extH = extW.length ? ' ' + extW.map(w => `<span class="dt e">${w}</span>`).join(' ') : '';
  box.innerHTML = `
    <div class="acc-top">
      <div class="acc-pct" style="color:${col}">${em} ${pct}%</div>
      <div>
        <div class="acc-lbl" style="color:${col}">${lbl}</div>
        <div class="acc-said">You said: "<em>${spoken || '—'}</em>"</div>
      </div>
    </div>
    <div class="diff">${diffH}${extH}</div>
    <div class="acc-tip">💡 ${tip}</div>`;
  box.className = `acc ${cls} show`;
}

// ── mic practice ──────────────────────────────────────────
function startPractice(target, btn, box) {
  if (btn.dataset.active === '1') return;
  if (!hasMic) {
    box.innerHTML = '<div style="font-size:.75rem;color:#991b1b">🎙️ Mic not available. Use Chrome or Edge.</div>';
    box.className = 'acc miss show'; return;
  }
  const rec = new SR();
  rec.lang = 'en-US'; rec.interimResults = false; rec.maxAlternatives = 3;
  btn.dataset.active = '1';
  btn.classList.add('rec'); btn.textContent = '⏹ Stop';
  let done = false;
  const finish = () => {
    if (done) return; done = true;
    btn.dataset.active = '0';
    btn.classList.remove('rec'); btn.textContent = '🎙️ Try again';
    // restore original onclick
    btn.onclick = () => startPractice(target, btn, box);
  };
  rec.onresult = e => {
    const spoken = Array.from(e.results[0]).map(r => r.transcript).join(' ').trim();
    finish(); showAcc(target, spoken, box);
  };
  rec.onerror = e => {
    finish();
    if (e.error === 'no-speech') {
      box.innerHTML = '<div style="font-size:.75rem;color:var(--mid)">🤫 No speech heard — try again!</div>';
      box.className = 'acc try show';
    } else {
      box.innerHTML = `<div style="font-size:.75rem;color:#991b1b">❌ Mic error (${e.error}). Check permissions.</div>`;
      box.className = 'acc miss show';
    }
  };
  rec.onend = () => finish();
  try { rec.start(); } catch(err) {
    finish();
    box.innerHTML = '<div style="font-size:.75rem;color:#991b1b">❌ Could not start mic. Allow access and retry.</div>';
    box.className = 'acc miss show';
  }
  btn.onclick = () => { try { rec.stop(); } catch(e) {} finish(); };
}

// ── global mic (input bar) ────────────────────────────────
function toggleMic() {
  const btn = document.getElementById('micBtn');
  const hint = document.getElementById('hint');
  const inp = document.getElementById('inp');
  if (!hasMic) { alert('Speech recognition requires Chrome or Edge.'); return; }
  if (gRecOn) {
    try { gRec.stop(); } catch(e) {}
    stopGlobal(); return;
  }
  gRec = new SR(); gRec.lang = 'en-US'; gRec.interimResults = true;
  gRecOn = true;
  btn.classList.add('rec'); btn.textContent = '⏹';
  hint.innerHTML = '<span class="rec-on">● Listening…</span> tap ⏹ to stop';
  gRec.onresult = e => {
    const t = Array.from(e.results).map(r => r[0].transcript).join('');
    inp.value = t; resize(inp);
    if (e.results[e.results.length - 1].isFinal) stopGlobal();
  };
  gRec.onerror = stopGlobal;
  gRec.onend = stopGlobal;
  try { gRec.start(); } catch(e) { stopGlobal(); }
}
function stopGlobal() {
  gRecOn = false;
  const btn = document.getElementById('micBtn');
  const hint = document.getElementById('hint');
  btn.classList.remove('rec'); btn.textContent = '🎙️';
  hint.innerHTML = 'Type or 🎙️ speak your question · <a href="https://claude.ai" style="color:var(--accent);text-decoration:none">Powered by Claude</a>';
}

// ── TTS ───────────────────────────────────────────────────
function hear(text, btn) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.82;
  if (btn) {
    const orig = btn.innerHTML;
    btn.classList.add('spk'); btn.textContent = '⏸ Speaking…';
    u.onend  = () => { btn.classList.remove('spk'); btn.innerHTML = orig; };
    u.onerror = () => { btn.classList.remove('spk'); btn.innerHTML = orig; };
  }
  window.speechSynthesis.speak(u);
}

// ── render blocks ─────────────────────────────────────────
function render(raw) {
  let h = raw;

  // WORD CARD
  h = h.replace(/\[\[WORD: word="([^"]*)" ipa="([^"]*)" syls="([^"]*)" stress="(\d+)" tip="([^"]*)"\]\]/g,
    (_, word, ipa, sylStr, si, tip) => {
      const arr = sylStr.split('-');
      const sylH = arr.map((s, i) => `<span class="syl${i == si ? ' s' : ''}">${s}</span>`).join('');
      const micH = hasMic ? `<button class="btn-mic" data-target="${escAttr(word)}" data-active="0">🎙️ Practice</button>` : '';
      return `<div class="wcard">
        <div class="wc-word">${word}</div>
        <div class="wc-ipa">${ipa}</div>
        <div class="wc-syls">${sylH}</div>
        <div class="wc-tip">💡 ${tip}</div>
        <div class="card-btns">
          <button class="btn-hear" data-say="${escAttr(word)}">🔊 Hear it</button>
          ${micH}
        </div>
        <div class="acc"></div>
      </div>`;
    });

  // STRESS
  h = h.replace(/\[\[STRESS: line="([^"]*)" note="([^"]*)"\]\]/g,
    (_, line, note) => {
      const plain = line.replace(/[A-Z]{2,}/g, w => w.toLowerCase()).replace(/\(([^)]+)\)/g, '$1');
      const wH = line.split(' ').map(w => {
        if (/^[A-Z]{2,}$/.test(w)) return `<span class="sw S">${w}</span>`;
        if (w.startsWith('(') && w.endsWith(')')) return `<span class="sw R">${w.slice(1,-1)}</span>`;
        return `<span class="sw">${w}</span>`;
      }).join(' ');
      const micH = hasMic ? `<button class="btn-mic" data-target="${escAttr(plain)}" data-active="0">🎙️ Practise sentence</button>` : '';
      return `<div class="stress-wrap">
        <div class="stress-line">${wH}</div>
        <div style="font-size:.73rem;color:var(--dim);margin-bottom:6px">📌 ${note}</div>
        <div class="card-btns">
          <button class="btn-hear" data-say="${escAttr(plain)}">🔊 Hear it</button>
          ${micH}
        </div>
        <div class="acc"></div>
      </div>`;
    });

  // PAIR
  h = h.replace(/\[\[PAIR: w1="([^"]*)" p1="([^"]*)" w2="([^"]*)" p2="([^"]*)" key="([^"]*)"\]\]/g,
    (_, w1, p1, w2, p2, key) => {
      const mk = (w) => hasMic
        ? `<button class="pair-mbtn" data-target="${escAttr(w)}" data-active="0">🎙️ Say it</button><div class="acc" style="margin-top:5px;text-align:left"></div>`
        : '';
      return `<div class="pairs">
        <div class="pair-card" data-word="${escAttr(w1)}">
          <div class="pair-w">${w1}</div><div class="pair-i">${p1}</div>
          <div class="pair-tap">tap card to hear</div>${mk(w1)}
        </div>
        <div class="pair-card" data-word="${escAttr(w2)}">
          <div class="pair-w">${w2}</div><div class="pair-i">${p2}</div>
          <div class="pair-tap">tap card to hear</div>${mk(w2)}
        </div>
      </div>
      <div style="font-size:.73rem;color:var(--mid);margin-top:6px;padding:6px 10px;background:var(--panel);border-radius:8px;border:1px solid var(--border)">🎯 ${key}</div>`;
    });

  // QUIZ
  h = h.replace(/\[\[QUIZ: q="([^"]*)" opts="([^"]*)" ans="(\d+)"\]\]/g,
    (_, q, opts, ans) => {
      const letters = ['A','B','C','D'];
      const opH = opts.split('|').map((o, i) =>
        `<button class="qopt" data-ok="${i == ans}" data-ans="${escAttr(opts.split('|')[ans])}">`
        + `<span class="qkey">${letters[i]}</span>${o}</button>`
      ).join('');
      return `<div class="quiz"><div class="quiz-q">❓ ${q}</div><div class="quiz-opts">${opH}</div></div>`;
    });

  // markdown
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\n/g, '<br>');
  h = h.replace(/(?:^|<br>)[-•] /g, '$1• ');
  return h;
}

function escAttr(s) { return s.replace(/"/g, '&quot;'); }

// ── attach event listeners ────────────────────────────────
function attach(bubble) {
  // Hear buttons
  bubble.querySelectorAll('.btn-hear[data-say]').forEach(b => {
    b.addEventListener('click', e => { e.stopPropagation(); hear(b.dataset.say, b); });
  });

  // Word card / stress mic
  bubble.querySelectorAll('.btn-mic[data-target]').forEach(b => {
    const box = b.closest('.wcard, .stress-wrap')?.querySelector('.acc');
    if (box) {
      b.onclick = () => startPractice(b.dataset.target, b, box);
    }
  });

  // Pair cards
  bubble.querySelectorAll('.pair-card').forEach(card => {
    const word = card.dataset.word;
    const micBtn = card.querySelector('.pair-mbtn');
    const box = card.querySelector('.acc');
    card.addEventListener('click', e => {
      if (micBtn && (e.target === micBtn || micBtn.contains(e.target))) return;
      hear(word, null);
    });
    if (micBtn && box) {
      micBtn.onclick = e => { e.stopPropagation(); startPractice(word, micBtn, box); };
    }
  });

  // Quiz
  bubble.querySelectorAll('.qopt').forEach(b => {
    b.addEventListener('click', () => {
      const parent = b.closest('.quiz-opts');
      parent.querySelectorAll('.qopt').forEach(x => x.disabled = true);
      const ok = b.dataset.ok === 'true';
      b.classList.add(ok ? 'ok' : 'no');
      if (!ok) parent.querySelectorAll('.qopt').forEach(x => { if (x.dataset.ok === 'true') x.classList.add('ok'); });
      const fb = document.createElement('div');
      fb.style.cssText = 'font-size:.76rem;margin-top:8px;padding:6px 10px;border-radius:7px;font-weight:600;';
      fb.style.background = ok ? '#f0fdf4' : '#fef2f2';
      fb.style.color = ok ? '#166534' : '#991b1b';
      fb.textContent = ok ? '✅ Correct! Well done!' : '❌ Not quite. Correct: ' + b.dataset.ans;
      b.closest('.quiz').appendChild(fb);
    });
  });
}

// ── message helpers ───────────────────────────────────────
function addTeacher(raw) {
  const d = document.createElement('div'); d.className = 'msg teacher';
  const av = document.createElement('div'); av.className = 'msg-av'; av.textContent = '👩‍🏫';
  const bu = document.createElement('div'); bu.className = 'bubble';
  bu.innerHTML = render(raw);
  d.appendChild(av); d.appendChild(bu);
  chatEl.appendChild(d);
  attach(bu);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function addUser(text) {
  const d = document.createElement('div'); d.className = 'msg user';
  const av = document.createElement('div'); av.className = 'msg-av'; av.textContent = '🧑';
  const bu = document.createElement('div'); bu.className = 'bubble'; bu.textContent = text;
  d.appendChild(bu); d.appendChild(av);
  chatEl.appendChild(d); chatEl.scrollTop = chatEl.scrollHeight;
}

function showTyping() {
  const d = document.createElement('div'); d.className = 'msg teacher'; d.id = 'typing';
  d.innerHTML = '<div class="msg-av">👩‍🏫</div><div class="tdots"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
  chatEl.appendChild(d); chatEl.scrollTop = chatEl.scrollHeight;
}
function hideTyping() { document.getElementById('typing')?.remove(); }

// ── API call ──────────────────────────────────────────────
async function sq(text) {
  if (busy) return; busy = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('qps').style.display = 'none';
  addUser(text);
  history.push({role: 'user', content: text});
  showTyping();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        system: SYS,
        messages: history
      })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }
    const data = await res.json();
    const reply = data?.content?.[0]?.text;
    if (!reply) throw new Error('Empty response from API');
    hideTyping();
    history.push({role: 'assistant', content: reply});
    addTeacher(reply);
  } catch(e) {
    hideTyping();
    console.error('API error:', e);
    addTeacher(`Hmm, I couldn't reach the server just now. 😕\n\nPlease check your internet connection and try again!\n\n_Error: ${e.message}_`);
  }
  busy = false;
  document.getElementById('sendBtn').disabled = false;
  chatEl.scrollTop = chatEl.scrollHeight;
}

async function doSend() {
  const inp = document.getElementById('inp');
  const t = inp.value.trim();
  if (!t || busy) return;
  inp.value = ''; inp.style.height = 'auto';
  await sq(t);
}

function onKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); } }
function resize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }
