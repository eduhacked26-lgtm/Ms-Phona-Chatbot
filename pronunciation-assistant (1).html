<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ms. Phona – Pronunciation Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f0eb; --surface:#fff; --panel:#fdf8f3;
  --accent:#e8623a; --accent2:#3a7de8; --accent3:#38b2a3; --accent4:#f0b429;
  --text:#1a1208; --mid:#5a4a38; --dim:#a89880; --border:#e8ddd0;
  --shadow:0 4px 20px rgba(26,18,8,0.09);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;overflow:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 15% 85%,rgba(232,98,58,.07) 0%,transparent 50%),radial-gradient(circle at 85% 15%,rgba(58,125,232,.07) 0%,transparent 50%);pointer-events:none;z-index:0}
.floaters{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.fsym{position:absolute;font-family:'Syne',sans-serif;font-weight:800;opacity:.04;color:var(--accent);animation:floatUp linear infinite;user-select:none}
@keyframes floatUp{0%{transform:translateY(110vh) rotate(0deg);opacity:0}10%{opacity:.04}90%{opacity:.04}100%{transform:translateY(-10vh) rotate(15deg);opacity:0}}
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;max-width:820px;margin:0 auto;width:100%}

/* HEADER */
.hdr{display:flex;align-items:center;gap:12px;padding:12px 18px;background:var(--surface);border-bottom:1px solid var(--border);box-shadow:0 2px 10px rgba(26,18,8,.05);flex-shrink:0;flex-wrap:wrap}
.av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#e8623a,#f0a070);display:flex;align-items:center;justify-content:center;font-size:1.35rem;flex-shrink:0;box-shadow:0 0 0 3px var(--bg),0 0 0 5px var(--accent);position:relative}
.av::after{content:'';position:absolute;bottom:2px;right:2px;width:9px;height:9px;border-radius:50%;background:#4ade80;border:2px solid var(--surface)}
.hdr-info{flex:1;min-width:80px}
.hdr-name{font-family:'Syne',sans-serif;font-weight:800;font-size:.98rem;line-height:1;margin-bottom:2px}
.hdr-sub{font-size:.68rem;color:var(--dim);font-weight:500}
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{font-size:.65rem;font-weight:600;padding:4px 10px;border-radius:20px;border:1.5px solid;cursor:pointer;transition:all .18s;white-space:nowrap;background:transparent;font-family:'DM Sans',sans-serif}
.chip:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.1)}
.chip.o{color:var(--accent);border-color:var(--accent)}.chip.o:hover{background:var(--accent);color:#fff}
.chip.b{color:var(--accent2);border-color:var(--accent2)}.chip.b:hover{background:var(--accent2);color:#fff}
.chip.t{color:var(--accent3);border-color:var(--accent3)}.chip.t:hover{background:var(--accent3);color:#fff}
.chip.y{color:#b07a00;border-color:var(--accent4)}.chip.y:hover{background:var(--accent4);color:#fff}

/* CHAT */
.chat{flex:1;overflow-y:auto;padding:18px 15px;display:flex;flex-direction:column;gap:15px;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:3px}.chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.msg{display:flex;gap:9px;animation:msgIn .28s cubic-bezier(.34,1.56,.64,1)}
@keyframes msgIn{from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:none}}
.msg.user{flex-direction:row-reverse}
.msg-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.95rem;margin-top:2px}
.msg.teacher .msg-av{background:linear-gradient(135deg,#e8623a,#f0a070)}
.msg.user .msg-av{background:linear-gradient(135deg,#3a7de8,#6fa3f5);color:#fff;font-size:.72rem;font-weight:700}
.bubble{max-width:75%;padding:12px 16px;border-radius:18px;font-size:.88rem;line-height:1.65}
.msg.teacher .bubble{background:var(--surface);border:1px solid var(--border);border-top-left-radius:4px;box-shadow:var(--shadow)}
.msg.user .bubble{background:#3a7de8;color:#fff;border-top-right-radius:4px;box-shadow:0 4px 14px rgba(58,125,232,.25)}

/* RICH CARDS */
.phon-card{background:linear-gradient(135deg,#fff8f0,#fef3e8);border:1.5px solid #f0c898;border-radius:13px;padding:14px 15px;margin-top:9px}
.pw{font-family:'Syne',sans-serif;font-weight:800;font-size:1.35rem;color:var(--accent);margin-bottom:2px}
.pi{font-size:.9rem;color:var(--mid);font-style:italic;margin-bottom:7px;letter-spacing:.5px}
.syls{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:9px}
.syl{padding:3px 9px;border-radius:7px;font-size:.76rem;font-weight:600;background:var(--bg);border:1.5px solid var(--border);color:var(--mid);transition:all .2s}
.syl.stressed{background:var(--accent);color:#fff;border-color:var(--accent);transform:translateY(-2px);box-shadow:0 3px 7px rgba(232,98,58,.3)}
.card-btns{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px}

/* BUTTONS */
.btn-hear{display:inline-flex;align-items:center;gap:5px;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:7px 13px;font-size:.74rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .18s}
.btn-hear:hover{background:#d4522a;transform:scale(1.03)}
.btn-hear.speaking{background:var(--accent3);animation:sPulse .6s infinite alternate}
@keyframes sPulse{from{box-shadow:0 0 0 0 rgba(56,178,163,.4)}to{box-shadow:0 0 0 7px rgba(56,178,163,0)}}

.btn-mic{display:inline-flex;align-items:center;gap:5px;background:transparent;color:var(--accent2);border:1.5px solid var(--accent2);border-radius:9px;padding:7px 13px;font-size:.74rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .18s}
.btn-mic:hover{background:var(--accent2);color:#fff}
.btn-mic.rec{background:#fee2e2;color:#dc2626;border-color:#dc2626;animation:rPulse 1s infinite}
@keyframes rPulse{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.35)}50%{box-shadow:0 0 0 7px rgba(220,38,38,0)}}

/* ACCURACY */
.acc-box{margin-top:10px;border-radius:12px;padding:12px 14px;border:1.5px solid;display:none}
.acc-box.show{display:block;animation:msgIn .3s ease}
.acc-box.great{background:#f0fdf4;border-color:#86efac}
.acc-box.good{background:#fefce8;border-color:#fde047}
.acc-box.try{background:#fff7ed;border-color:#fdba74}
.acc-box.miss{background:#fef2f2;border-color:#fca5a5}
.acc-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ring-wrap{width:50px;height:50px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative}
.ring-wrap svg{position:absolute;top:0;left:0;width:50px;height:50px;transform:rotate(-90deg)}
.rbg{fill:none;stroke:rgba(0,0,0,.08);stroke-width:4}
.rfill{fill:none;stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .7s ease}
.rnum{position:relative;z-index:1;font-family:'Syne',sans-serif;font-weight:800;font-size:.8rem}
.acc-lbl{font-weight:700;font-size:.87rem}
.acc-sub{font-size:.71rem;color:var(--dim);margin-top:1px}
.wc-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:7px}
.wc{flex:1;min-width:90px;background:rgba(255,255,255,.7);border-radius:9px;padding:6px 10px;border:1px solid rgba(0,0,0,.05)}
.wc-l{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:2px}
.wc-v{font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem}
.diff-row{display:flex;gap:3px;flex-wrap:wrap;margin-top:8px;align-items:center}
.dt{padding:2px 7px;border-radius:5px;font-size:.78rem;font-weight:600}
.dt.m{background:rgba(74,222,128,.2);color:#166534}
.dt.x{background:rgba(252,165,165,.3);color:#991b1b;text-decoration:line-through}
.dt.e{background:rgba(253,186,116,.3);color:#9a3412}
.acc-tip{font-size:.74rem;margin-top:7px;color:var(--mid);font-style:italic}

/* PAIRS */
.pairs-wrap{display:flex;gap:9px;margin-top:9px}
.pair-card{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:11px;padding:11px 12px;text-align:center;cursor:pointer;transition:all .2s;user-select:none}
.pair-card:hover{border-color:var(--accent2);background:#f0f5ff;transform:translateY(-2px)}
.pair-w{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;color:var(--text);margin-bottom:2px}
.pair-i{font-size:.74rem;color:var(--dim);font-style:italic}
.pair-tap{font-size:.63rem;color:var(--dim);margin-top:3px}
.pair-mic-btn{margin-top:7px;width:100%;padding:5px 0;border-radius:7px;border:1px solid var(--border);background:#fff;font-size:.67rem;font-weight:600;color:var(--accent2);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.pair-mic-btn:hover{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.pair-mic-btn.rec{background:#fee2e2;color:#dc2626;border-color:#dc2626}

/* STRESS */
.stress-wrap{margin-top:9px}
.stress-line{display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding:9px 12px;background:var(--bg);border-radius:10px;border:1px solid var(--border)}
.sw{font-size:.95rem;font-weight:500}
.sw.S{font-weight:800;font-size:1.08rem;color:var(--accent2);text-decoration:underline;text-decoration-color:var(--accent2);text-underline-offset:3px}
.sw.R{color:var(--dim);font-size:.84rem}

/* QUIZ */
.quiz-box{background:linear-gradient(135deg,#f0f5ff,#e8f0ff);border:1.5px solid #c4d7ff;border-radius:13px;padding:14px 16px;margin-top:9px}
.quiz-q{font-weight:600;margin-bottom:10px;font-size:.88rem}
.quiz-opts{display:flex;flex-direction:column;gap:6px}
.qopt{background:#fff;border:1.5px solid var(--border);border-radius:9px;padding:8px 13px;cursor:pointer;font-size:.84rem;font-weight:500;transition:all .15s;text-align:left;font-family:'DM Sans',sans-serif;color:var(--text);display:flex;align-items:center;gap:7px}
.qopt:hover:not([disabled]){border-color:var(--accent2);background:#f0f5ff;transform:translateX(3px)}
.qopt.ok{border-color:#22c55e;background:#f0fdf4;color:#166534}
.qopt.no{border-color:#ef4444;background:#fef2f2;color:#991b1b}
.qkey{width:20px;height:20px;border-radius:5px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;flex-shrink:0;border:1px solid var(--border)}

/* TYPING */
.tdots{display:flex;gap:4px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:4px;box-shadow:var(--shadow)}
.tdots span{width:7px;height:7px;border-radius:50%;background:var(--dim);animation:td 1.2s infinite}
.tdots span:nth-child(2){animation-delay:.2s}.tdots span:nth-child(3){animation-delay:.4s}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

/* QUICK BTNS */
.qps{padding:0 15px 9px;display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.qpb{font-size:.69rem;font-weight:600;padding:4px 10px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--mid);cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif;white-space:nowrap}
.qpb:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px)}

/* INPUT */
.input-area{padding:10px 15px 16px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.input-row{display:flex;gap:7px;align-items:flex-end;background:var(--panel);border:1.5px solid var(--border);border-radius:20px;padding:7px 7px 7px 15px;transition:border-color .2s,box-shadow .2s}
.input-row:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,98,58,.09)}
#inp{flex:1;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--text);resize:none;max-height:110px;min-height:26px;line-height:1.5;outline:none}
#inp::placeholder{color:var(--dim)}
.mic-global{width:38px;height:38px;border-radius:12px;border:1.5px solid var(--border);background:var(--panel);color:var(--mid);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0}
.mic-global:hover{border-color:var(--accent2);color:var(--accent2);background:#eef3ff}
.mic-global.rec{background:#fee2e2;border-color:#dc2626;color:#dc2626;animation:rPulse 1s infinite}
.send{width:38px;height:38px;border-radius:12px;background:var(--accent);border:none;color:#fff;font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0}
.send:hover{background:#d4522a;transform:scale(1.07)}
.send:disabled{background:var(--border);cursor:default;transform:none}
.wave{align-items:center;gap:3px;height:26px;padding:0 7px;background:var(--bg);border-radius:7px;border:1px solid var(--border);display:none}
.wave.on{display:flex}
.wl{width:3px;background:var(--accent2);border-radius:2px;animation:wv .75s infinite ease-in-out;min-height:4px}
.wl:nth-child(1){height:7px;animation-delay:0s}.wl:nth-child(2){height:16px;animation-delay:.1s}.wl:nth-child(3){height:11px;animation-delay:.2s}
.wl:nth-child(4){height:20px;animation-delay:.3s}.wl:nth-child(5){height:9px;animation-delay:.4s}.wl:nth-child(6){height:15px;animation-delay:.15s}.wl:nth-child(7){height:7px;animation-delay:.25s}
@keyframes wv{0%,100%{transform:scaleY(.35)}50%{transform:scaleY(1)}}
.input-meta{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:5px}
.hint{font-size:.64rem;color:var(--dim)}
.rec-status{font-size:.65rem;color:#dc2626;font-weight:600;padding:2px 7px;background:#fee2e2;border-radius:6px;display:none}
.rec-status.on{display:inline-block}

@media(max-width:580px){.chips{display:none}.bubble{max-width:88%}}
</style>
</head>
<body>
<div class="floaters" id="floaters"></div>
<div class="app">

  <div class="hdr">
    <div class="av">👩‍🏫</div>
    <div class="hdr-info">
      <div class="hdr-name">Ms. Phona</div>
      <div class="hdr-sub">English Pronunciation Coach · Mic-enabled 🎙️</div>
    </div>
    <div class="chips">
      <div class="chip o" onclick="sq('How do I pronounce the word comfortable?')">🔊 Pronounce</div>
      <div class="chip b" onclick="sq('Explain sentence stress with an example')">🎵 Stress</div>
      <div class="chip t" onclick="sq('Give me a minimal pairs exercise with ship and sheep')">👥 Pairs</div>
      <div class="chip y" onclick="sq('Give me a quick pronunciation quiz!')">🧩 Quiz</div>
    </div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="qps" id="qps">
    <button class="qpb" onclick="sq('How do I pronounce Wednesday?')">📅 Wednesday</button>
    <button class="qpb" onclick="sq('Difference between th in this and think')">🔡 TH sounds</button>
    <button class="qpb" onclick="sq('Help me with silent letters in English')">🤫 Silent letters</button>
    <button class="qpb" onclick="sq('Show me the schwa sound with examples')">🔤 Schwa /ə/</button>
    <button class="qpb" onclick="sq('Minimal pairs: bit and beat')">🎯 bit / beat</button>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="inp" rows="1" placeholder="Ask Ms. Phona anything about pronunciation…"
        onkeydown="onKey(event)" oninput="resize(this)"></textarea>
      <div class="wave" id="wave">
        <div class="wl"></div><div class="wl"></div><div class="wl"></div>
        <div class="wl"></div><div class="wl"></div><div class="wl"></div><div class="wl"></div>
      </div>
      <button class="mic-global" id="gmicBtn" onclick="toggleGlobalMic()" title="Speak your question">🎙️</button>
      <button class="send" id="sendBtn" onclick="send()">➤</button>
    </div>
    <div class="input-meta">
      <span class="hint">Type or 🎙️ speak your question</span>
      <span class="rec-status" id="recStatus">● Listening…</span>
    </div>
  </div>
</div>

<script>
// ── floating symbols ──────────────────────────────────────
const syms=['/æ/','/ɪ/','/θ/','/ʃ/','/ŋ/','/ɔː/','IPA','stress','/ə/','fluency','/juː/','/dʒ/'];
document.getElementById('floaters').innerHTML=syms.map((s,i)=>
  `<div class="fsym" style="left:${4+i*8}%;font-size:${1.4+Math.random()*1.8}rem;animation-duration:${13+Math.random()*9}s;animation-delay:${-Math.random()*13}s">${s}</div>`
).join('');

// ── globals ───────────────────────────────────────────────
const chat=document.getElementById('chat');
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const hasMic=!!SR;
let history=[], busy=false, globalRec=null, globalRecording=false;

// ── system prompt ─────────────────────────────────────────
const SYS=`You are Ms. Phona, a cool encouraging English pronunciation coach for tweens and teens (11-17). Be warm, witty, and snappy. Use light humour and occasional emojis.

When you explain a word's pronunciation, ALWAYS include this block (fill in real values):
[[WORD: word="X" ipa="/X/" syls="X-X-X" stress="0" tip="memory tip here"]]

When you show sentence stress, ALWAYS include:
[[STRESS: line="I WANT to GO home" note="WANT and GO are stressed — they carry the main meaning"]]
(Write stressed words in ALL CAPS, reduced words in (parentheses))

When you do minimal pairs, ALWAYS include:
[[PAIR: w1="ship" p1="/ʃɪp/" w2="sheep" p2="/ʃiːp/" key="Short /ɪ/ vs long /iː/ — stretch the ee in sheep"]]

When you give a quiz, ALWAYS include:
[[QUIZ: q="Which syllable is stressed in photographer?" opts="PHO-to-gra-pher|pho-TOG-ra-pher|pho-to-gra-PHER" ans="1"]]

Rules:
- Always use these exact block formats so the UI can render them correctly
- Keep text outside blocks short and encouraging
- Never skip the blocks when the topic calls for them`;

// ── accuracy helpers ──────────────────────────────────────
function lev(a,b){
  const m=a.length,n=b.length,D=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)D[i][j]=a[i-1]===b[j-1]?D[i-1][j-1]:1+Math.min(D[i-1][j],D[i][j-1],D[i-1][j-1]);
  return D[m][n];
}
function score(target,spoken){
  const t=target.toLowerCase().replace(/[^a-z\s]/g,'').trim();
  const s=(spoken||'').toLowerCase().replace(/[^a-z\s]/g,'').trim();
  const tW=t.split(/\s+/), sW=s?s.split(/\s+/):[];
  if(!s)return{pct:0,tW,sW};
  if(tW.length===1){
    if(tW[0]===(sW[0]||''))return{pct:100,tW,sW};
    const sim=Math.max(0,Math.round((1-lev(tW[0],sW[0]||'')/Math.max(tW[0].length,(sW[0]||'').length||1))*100));
    return{pct:sim,tW,sW};
  }
  const used=new Array(sW.length).fill(false);let hits=0;
  tW.forEach(tw=>{const i=sW.findIndex((sw,j)=>!used[j]&&sw===tw);if(i!==-1){hits++;used[i]=true;}});
  return{pct:Math.round(hits/tW.length*100),tW,sW};
}
function badge(p){
  if(p>=90)return{cls:'great',em:'🏆',lbl:'Excellent!',tip:'Spot-on! You nailed it!'};
  if(p>=75)return{cls:'good',em:'🌟',lbl:'Great job!',tip:'Almost perfect — just a tiny tweak needed.'};
  if(p>=50)return{cls:'try',em:'💪',lbl:'Good try!',tip:'Getting there! Try again slowly and clearly.'};
  return{cls:'miss',em:'🔁',lbl:'Try again!',tip:'Listen to the example first, then record again.'};
}
function renderAcc(target,spoken,box){
  const{pct,tW,sW}=score(target,spoken);
  const{cls,em,lbl,tip}=badge(pct);
  const C=2*Math.PI*22,off=(C-(pct/100)*C).toFixed(1);
  const col={great:'#22c55e',good:'#eab308',try:'#f97316',miss:'#ef4444'}[cls];
  const diffH=tW.map(w=>`<span class="dt ${sW.includes(w)?'m':'x'}">${w}</span>`).join(' ');
  const extW=sW.filter(w=>!tW.includes(w));
  const extH=extW.length?' '+extW.map(w=>`<span class="dt e">${w}</span>`).join(' '):'';
  box.innerHTML=`
    <div class="acc-top">
      <div class="ring-wrap">
        <svg viewBox="0 0 50 50"><circle class="rbg" cx="25" cy="25" r="22"/><circle class="rfill" cx="25" cy="25" r="22" stroke="${col}" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off}"/></svg>
        <span class="rnum" style="color:${col}">${pct}%</span>
      </div>
      <div><div class="acc-lbl">${em} ${lbl}</div><div class="acc-sub">You said: "<em>${spoken||'—'}</em>"</div></div>
    </div>
    <div class="wc-row">
      <div class="wc"><div class="wc-l">Target</div><div class="wc-v">${target}</div></div>
      <div class="wc"><div class="wc-l">Heard</div><div class="wc-v" style="color:${col}">${spoken||'—'}</div></div>
    </div>
    <div class="diff-row">${diffH}${extH}</div>
    <div class="acc-tip">💡 ${tip}</div>`;
  box.className=`acc-box ${cls} show`;
}

// ── mic practice (per card) ───────────────────────────────
function startPractice(target,btn,box){
  // Prevent double-start
  if(btn.dataset.active==='1')return;
  if(!hasMic){
    box.innerHTML='<div style="color:#dc2626;font-size:.78rem">🎙️ Mic not supported here. Please open in Chrome or Edge.</div>';
    box.className='acc-box miss show';return;
  }
  const rec=new SR();
  rec.lang='en-US';rec.interimResults=false;rec.maxAlternatives=3;
  btn.dataset.active='1';
  btn.classList.add('rec');btn.textContent='⏹ Stop';

  let finished=false;
  function finish(){
    if(finished)return;finished=true;
    btn.dataset.active='0';
    btn.classList.remove('rec');btn.textContent='🎙️ Try again';
  }

  rec.onresult=e=>{
    const spoken=Array.from(e.results[0]).map(r=>r.transcript).join(' ').trim();
    finish();
    renderAcc(target,spoken,box);
  };
  rec.onerror=e=>{
    finish();
    // 'no-speech' is not really an error — just silence
    if(e.error==='no-speech'){
      box.innerHTML='<div style="font-size:.78rem;color:var(--mid)">🤫 No speech detected. Please try speaking again.</div>';
      box.className='acc-box try show';
    } else {
      box.innerHTML=`<div style="font-size:.78rem;color:#dc2626">❌ Mic error: ${e.error}. Check permissions and try again.</div>`;
      box.className='acc-box miss show';
    }
  };
  rec.onend=()=>finish();

  try{ rec.start(); }catch(err){
    finish();
    box.innerHTML='<div style="font-size:.78rem;color:#dc2626">❌ Could not start microphone. Please allow mic access.</div>';
    box.className='acc-box miss show';
  }

  // Allow stop button
  btn.onclick=function(){
    try{rec.stop();}catch(e){}
    finish();
  };
}

// ── global mic (input bar) ────────────────────────────────
function toggleGlobalMic(){
  const btn=document.getElementById('gmicBtn');
  const wave=document.getElementById('wave');
  const rs=document.getElementById('recStatus');
  const inp=document.getElementById('inp');

  if(!hasMic){
    alert('Speech recognition requires Chrome or Edge browser.');return;
  }
  if(globalRecording){
    try{globalRec.stop();}catch(e){}
    globalRecording=false;
    btn.classList.remove('rec');btn.textContent='🎙️';
    wave.classList.remove('on');rs.classList.remove('on');
    return;
  }
  globalRec=new SR();
  globalRec.lang='en-US';globalRec.interimResults=true;globalRec.maxAlternatives=1;
  globalRecording=true;
  btn.classList.add('rec');btn.textContent='⏹';
  wave.classList.add('on');rs.classList.add('on');

  globalRec.onresult=e=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join('');
    inp.value=t;resize(inp);
    if(e.results[e.results.length-1].isFinal){
      stopGlobal();
    }
  };
  globalRec.onerror=()=>stopGlobal();
  globalRec.onend=()=>stopGlobal();
  try{globalRec.start();}catch(e){stopGlobal();}
}
function stopGlobal(){
  globalRecording=false;
  const btn=document.getElementById('gmicBtn');
  const wave=document.getElementById('wave');
  const rs=document.getElementById('recStatus');
  btn.classList.remove('rec');btn.textContent='🎙️';
  wave.classList.remove('on');rs.classList.remove('on');
}

// ── TTS ───────────────────────────────────────────────────
function hear(text,btn){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=0.82;
  if(btn){
    const orig=btn.innerHTML;
    btn.classList.add('speaking');btn.textContent='⏸ Speaking…';
    u.onend=()=>{btn.classList.remove('speaking');btn.innerHTML=orig;};
    u.onerror=()=>{btn.classList.remove('speaking');btn.innerHTML=orig;};
  }
  window.speechSynthesis.speak(u);
}

// ── render blocks ─────────────────────────────────────────
function render(raw){
  let h=raw;

  // WORD CARD
  h=h.replace(/\[\[WORD: word="([^"]*)" ipa="([^"]*)" syls="([^"]*)" stress="(\d+)" tip="([^"]*)"\]\]/g,
    (_,word,ipa,sylStr,si,tip)=>{
      const arr=sylStr.split('-');
      const sylH=arr.map((s,i)=>`<span class="syl${i==si?' stressed':''}">${s}</span>`).join('');
      const micH=hasMic?`<button class="btn-mic" data-target="${word}" data-active="0">🎙️ Practice</button>`:'';
      return `<div class="phon-card">
        <div class="pw">${word}</div>
        <div class="pi">${ipa}</div>
        <div class="syls">${sylH}</div>
        <div style="font-size:.72rem;color:var(--mid);margin-bottom:8px">💡 ${tip}</div>
        <div class="card-btns">
          <button class="btn-hear" data-say="${word}">🔊 Hear it</button>
          ${micH}
        </div>
        <div class="acc-box"></div>
      </div>`;
    });

  // STRESS
  h=h.replace(/\[\[STRESS: line="([^"]*)" note="([^"]*)"\]\]/g,
    (_,line,note)=>{
      const plain=line.replace(/[A-Z]{2,}/g,w=>w.toLowerCase()).replace(/\(([^)]+)\)/g,'$1');
      const wH=line.split(' ').map(w=>{
        if(/^[A-Z]{2,}$/.test(w))return`<span class="sw S">${w}</span>`;
        if(w.startsWith('(')&&w.endsWith(')'))return`<span class="sw R">${w.slice(1,-1)}</span>`;
        return`<span class="sw">${w}</span>`;
      }).join(' ');
      const micH=hasMic?`<button class="btn-mic" data-target="${plain}" data-active="0">🎙️ Practise sentence</button>`:'';
      return `<div class="stress-wrap">
        <div class="stress-line">${wH}</div>
        <div style="font-size:.71rem;color:var(--dim);margin-top:5px">📌 ${note}</div>
        <div class="card-btns" style="margin-top:8px">
          <button class="btn-hear" data-say="${plain}">🔊 Hear it</button>
          ${micH}
        </div>
        <div class="acc-box"></div>
      </div>`;
    });

  // PAIR
  h=h.replace(/\[\[PAIR: w1="([^"]*)" p1="([^"]*)" w2="([^"]*)" p2="([^"]*)" key="([^"]*)"\]\]/g,
    (_,w1,p1,w2,p2,key)=>{
      const mk=hasMic?`<button class="pair-mic-btn" data-target="WORD" data-active="0">🎙️ Say it</button><div class="acc-box" style="margin-top:5px"></div>`:'';
      const m1=mk.replace('WORD',w1), m2=mk.replace('WORD',w2);
      return `<div class="pairs-wrap">
        <div class="pair-card" data-word="${w1}">
          <div class="pair-w">${w1}</div><div class="pair-i">${p1}</div>
          <div class="pair-tap">tap to hear</div>${m1}
        </div>
        <div class="pair-card" data-word="${w2}">
          <div class="pair-w">${w2}</div><div class="pair-i">${p2}</div>
          <div class="pair-tap">tap to hear</div>${m2}
        </div>
      </div>
      <div style="font-size:.73rem;color:var(--mid);margin-top:7px;padding:7px 10px;background:var(--bg);border-radius:8px;border:1px solid var(--border)">🎯 ${key}</div>`;
    });

  // QUIZ
  h=h.replace(/\[\[QUIZ: q="([^"]*)" opts="([^"]*)" ans="(\d+)"\]\]/g,
    (_,q,opts,ans)=>{
      const letters=['A','B','C','D'];
      const opH=opts.split('|').map((o,i)=>
        `<button class="qopt" data-ok="${i==ans}" data-ans="${opts.split('|')[ans]}"><span class="qkey">${letters[i]}</span>${o}</button>`
      ).join('');
      return `<div class="quiz-box"><div class="quiz-q">❓ ${q}</div><div class="quiz-opts">${opH}</div></div>`;
    });

  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/\n/g,'<br>');
  h=h.replace(/(?:^|<br>)- /g,'$1• ');
  return h;
}

// ── attach handlers AFTER inserting HTML ─────────────────
function attach(bubble){
  // Hear buttons
  bubble.querySelectorAll('.btn-hear[data-say]').forEach(b=>{
    b.addEventListener('click',e=>{e.stopPropagation();hear(b.dataset.say,b);});
  });

  // Word/stress mic buttons
  bubble.querySelectorAll('.btn-mic[data-target]').forEach(b=>{
    const box=b.closest('.phon-card,.stress-wrap')?.querySelector('.acc-box');
    if(box){
      b.addEventListener('click',e=>{
        e.stopPropagation();
        startPractice(b.dataset.target,b,box);
      });
    }
  });

  // Pair cards (tap=TTS, mic btn=practice)
  bubble.querySelectorAll('.pair-card').forEach(card=>{
    const word=card.dataset.word;
    const micBtn=card.querySelector('.pair-mic-btn');
    const box=card.querySelector('.acc-box');

    // TTS on card tap
    card.addEventListener('click',e=>{
      if(e.target===micBtn||micBtn?.contains(e.target))return;
      hear(word,null);
    });
    // Mic practice
    if(micBtn&&box){
      micBtn.addEventListener('click',e=>{
        e.stopPropagation();
        startPractice(word,micBtn,box);
      });
    }
  });

  // Quiz options
  bubble.querySelectorAll('.qopt').forEach(b=>{
    b.addEventListener('click',()=>doQuiz(b));
  });
}

function doQuiz(btn){
  const parent=btn.closest('.quiz-opts');
  parent.querySelectorAll('.qopt').forEach(b=>b.disabled=true);
  const ok=btn.dataset.ok==='true';
  btn.classList.add(ok?'ok':'no');
  if(!ok)parent.querySelectorAll('.qopt').forEach(b=>{if(b.dataset.ok==='true')b.classList.add('ok');});
  const fb=document.createElement('div');
  fb.style.cssText='font-size:.76rem;margin-top:8px;padding:7px 10px;border-radius:8px;font-weight:600;';
  fb.style.background=ok?'#f0fdf4':'#fef2f2';fb.style.color=ok?'#166534':'#991b1b';
  fb.textContent=ok?'✅ Correct! Well done!':'❌ Not quite. Correct: '+btn.dataset.ans;
  btn.closest('.quiz-box').appendChild(fb);
}

// ── message rendering ─────────────────────────────────────
function addTeacher(raw){
  const d=document.createElement('div');d.className='msg teacher';
  const av=document.createElement('div');av.className='msg-av';av.textContent='👩‍🏫';
  const bu=document.createElement('div');bu.className='bubble';
  bu.innerHTML=render(raw);
  d.appendChild(av);d.appendChild(bu);
  chat.appendChild(d);
  attach(bu);
  chat.scrollTop=chat.scrollHeight;
}
function addUser(text){
  const d=document.createElement('div');d.className='msg user';
  const av=document.createElement('div');av.className='msg-av';av.textContent='🧑';
  const bu=document.createElement('div');bu.className='bubble';bu.textContent=text;
  d.appendChild(bu);d.appendChild(av);
  chat.appendChild(d);chat.scrollTop=chat.scrollHeight;
}
function showTyping(){
  const d=document.createElement('div');d.className='msg teacher';d.id='typing';
  d.innerHTML=`<div class="msg-av">👩‍🏫</div><div class="tdots"><span></span><span></span><span></span></div>`;
  chat.appendChild(d);chat.scrollTop=chat.scrollHeight;
}
function hideTyping(){document.getElementById('typing')?.remove();}

// ── API call ──────────────────────────────────────────────
async function sq(text){
  if(busy)return;busy=true;
  document.getElementById('sendBtn').disabled=true;
  document.getElementById('qps').style.display='none';
  addUser(text);
  history.push({role:'user',content:text});
  showTyping();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1024,
        system:SYS,
        messages:history
      })
    });
    if(!res.ok){
      const err=await res.json().catch(()=>({error:{message:'Unknown error'}}));
      throw new Error(err?.error?.message||`HTTP ${res.status}`);
    }
    const data=await res.json();
    const reply=data.content?.[0]?.text||"Hmm, I got an empty response — try again!";
    hideTyping();
    history.push({role:'assistant',content:reply});
    addTeacher(reply);
  }catch(e){
    hideTyping();
    addTeacher(`Oops! Something went wrong 😅\n\n_Error: ${e.message}_\n\nPlease try again in a moment!`);
  }
  busy=false;document.getElementById('sendBtn').disabled=false;
  chat.scrollTop=chat.scrollHeight;
}

async function send(){
  const inp=document.getElementById('inp');
  const t=inp.value.trim();
  if(!t||busy)return;
  inp.value='';inp.style.height='auto';
  await sq(t);
}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function resize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px';}
